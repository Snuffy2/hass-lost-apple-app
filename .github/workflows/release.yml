name: Release Lost Apple App

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag_name:
        description: Image tag only; does not update app version
        required: true
        type: string
  release:
    types: [published]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: snuffy2/hass-lost-apple-app
  RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag_name }}

jobs:
  publish-images:
    name: Build and publish Lost Apple App image
    runs-on: ubuntu-latest
    if: github.event.repository.fork == false
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.target_commitish || github.ref }}

      - name: Update and commit release version files
        if: ${{ github.event_name == 'release' }}
        run: |
          APP_VERSION="${RELEASE_TAG#v}"
          if ! printf "%s\n" "${APP_VERSION}" | grep -Eq '^[0-9]+([.][0-9]+)*((a|b|rc|[.]post|[.]dev)[0-9]+)?([+][0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$'; then
            echo "::error::Invalid release version: ${APP_VERSION}"
            exit 1
          fi
          sed -i "s/^version: .*/version: ${APP_VERSION}/" ./app/lost_apple/config.yaml
          sed -i "s/^VERSION: Final = \".*\"/VERSION: Final = \"${APP_VERSION}\"/" ./app/src/lost_apple_app/const.py
          if git diff --quiet -- ./app/lost_apple/config.yaml ./app/src/lost_apple_app/const.py; then
            echo "Version files already match ${APP_VERSION}."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ./app/lost_apple/config.yaml ./app/src/lost_apple_app/const.py
          git commit -m "chore: update app version to ${APP_VERSION} [skip ci]"
          git push origin HEAD:${{ github.event.repository.default_branch }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=edge,branch=main,enable=${{ github.event_name == 'push' }}
            type=semver,pattern={{version}},value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' && !github.event.release.prerelease }}
            type=raw,value=${{ inputs.tag_name }},enable=${{ github.event_name == 'workflow_dispatch' }}
          labels: |
            org.opencontainers.image.source=https://github.com/Snuffy2/hass-lost-apple-app/archive/${{ github.sha }}.tar.gz

      - name: Build and publish Lost Apple App image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: app/lost_apple/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

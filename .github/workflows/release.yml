name: Release Lost Apple App

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag_name:
        description: Image tag only; does not update app version
        required: true
        type: string
  release:
    types: [published]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: snuffy2/hass-lost-apple-app
  RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag_name }}

jobs:
  publish-images:
    name: Build and publish Lost Apple App image
    runs-on: ubuntu-latest
    if: github.event.repository.fork == false
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.target_commitish || github.ref }}

      - name: Update release version files
        if: ${{ github.event_name == 'release' }}
        run: |
          APP_VERSION="${RELEASE_TAG#v}"
          python3 .github/scripts/update_release_version.py \
            --version "${APP_VERSION}" \
            --config-path ./app/lost_apple/config.yaml \
            --const-path ./app/src/lost_apple_app/const.py
          if git diff --quiet -- ./app/lost_apple/config.yaml ./app/src/lost_apple_app/const.py; then
            echo "Version files already match ${APP_VERSION}."
            exit 0
          fi

      - name: Update Changelog
        if: ${{ github.event_name == 'release' && github.event.release.prerelease == false  }}
        uses: rhysd/changelog-from-release/action@v3
        with:
          file: CHANGELOG.md
          github_token: ${{ secrets.GITHUB_TOKEN }}
          commit: false

      - name: Commit & Push Version Changes
        if: ${{ github.event_name == 'release' && github.event.release.prerelease == false  }}
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: ${{ github.event.repository.default_branch }}
          commit_message: 'Updating to version ${{ github.event.release.tag_name }} [skip ci]'

      - name: Update Release with Version Changes Commit
        if: ${{ github.event_name == 'release' && github.event.release.prerelease == false  }}
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          git check-ref-format "refs/tags/${RELEASE_TAG}"
          git tag -f -- "${RELEASE_TAG}"
          git push -f origin -- "${RELEASE_TAG}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=edge,branch=main,enable=${{ github.event_name == 'push' }}
            type=semver,pattern={{version}},value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' && !github.event.release.prerelease }}
            type=raw,value=${{ inputs.tag_name }},enable=${{ github.event_name == 'workflow_dispatch' }}
          labels: |
            org.opencontainers.image.source=https://github.com/Snuffy2/hass-lost-apple-app/archive/${{ github.sha }}.tar.gz

      - name: Build and publish Lost Apple App image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: app/lost_apple/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

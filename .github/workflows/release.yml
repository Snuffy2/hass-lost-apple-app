name: Release Lost Apple App

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag_name:
        description: Image tag to publish
        required: true
        type: string
  release:
    types: [published, edited]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: snuffy2/hass-lost-apple-app
  RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag_name }}

jobs:
  publish-images:
    name: Build and publish Lost Apple App image
    runs-on: ubuntu-latest
    if: github.event.repository.fork == false
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.target_commitish || github.ref }}

      - name: Update checked-out version files for image build
        if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'release' }}
        run: |
          sed -i "s/^version: .*/version: ${RELEASE_TAG}/" ./app/lost_apple/config.yaml
          sed -i "s/^VERSION: Final = \".*\"/VERSION: Final = \"${RELEASE_TAG}\"/" ./app/src/lost_apple_app/const.py

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=edge,branch=main,enable=${{ github.event_name == 'push' }}
            type=semver,pattern={{version}},value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' && !github.event.release.prerelease }}
            type=raw,value=${{ inputs.tag_name }},enable=${{ github.event_name == 'workflow_dispatch' }}
          labels: |
            org.opencontainers.image.source=https://github.com/Snuffy2/hass-lost-apple-app/archive/${{ github.sha }}.tar.gz

      - name: Build and publish Lost Apple App image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: app/lost_apple/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
